<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Village 3D - Mitologia Norrena</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="gameContainer"></div>
    <div id="ui">
        <div id="hudTop">
            <div class="resource">
                <span class="icon">🌾</span>
                <span id="grainCount">0</span> Grano
            </div>
            <div class="resource">
                <span class="icon">🪵</span>
                <span id="woodCount">0</span> Legno
            </div>
            <div class="resource">
                <span class="icon">⛏️</span>
                <span id="stoneCount">0</span> Pietra
            </div>
            <div class="resource">
                <span class="icon">⚔️</span>
                <span id="goldCount">0</span> Oro
            </div>
            <div class="resource">
                <span class="icon">👥</span>
                <span id="populationCount">0</span> Abitanti
            </div>
        </div>

        <div id="buildingPanel" class="panel hidden">
            <h3>Costruisci</h3>
            <div id="buildingsList"></div>
        </div>

        <div id="infoPanel" class="panel hidden">
            <h3 id="infoTitle">Informazioni</h3>
            <p id="infoContent"></p>
            <button id="closeInfo">Chiudi</button>
        </div>

        <div id="controlsPanel" class="panel">
            <button id="buildBtn">Costruisci (B)</button>
            <button id="harvestBtn">Raccogli (H)</button>
            <button id="settingsBtn">Impostazioni (S)</button>
        </div>

        <div id="mythologyPanel" class="panel">
            <h3>Mitologia Norrena</h3>
            <div id="godsList"></div>
        </div>

        <div id="statsPanel" class="panel">
            <h3>Statistiche</h3>
            <p>Giorno: <span id="dayCount">0</span></p>
            <p>Felicità: <span id="happinessCount">50</span>%</p>
            <p>Difesa: <span id="defenseCount">0</span></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/mythology.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/buildings.js"></script>
    <script src="js/village.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
